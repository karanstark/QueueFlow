services:
  - type: web
    name: queueflow-backend
    runtime: python
    rootDir: backend
    pythonVersion: "3.11.9"
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      # Option 1: SQLite (simple, good for demo)
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./queueflow.db
      # Option 2: PostgreSQL (production-grade, uncomment and set value)
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: queueflow-db
      #     property: connectionString

# Uncomment below to provision a free PostgreSQL database on Render
# databases:
#   - name: queueflow-db
#     plan: free
