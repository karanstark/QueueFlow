services:
  - type: web
    name: queueflow-backend
    runtime: python
    rootDir: backend
    pythonVersion: "3.11.9"
    buildCommand: "pip install -r requirements.txt && alembic upgrade head"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite+aiosqlite:///./queueflow.db
